name: Stakekit Asset Deployment
run-name: "Stakekit Asset Deployment by @${{ github.actor }}"
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          audience: sts.amazonaws.com
          aws-region: us-east-1
          role-to-assume: ${{ secrets.ROLE_ARN }}

      - name: Deploy to S3 and invalidate CloudFront
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          S3_BUCKET_REGION: ${{ secrets.S3_BUCKET_REGION }}
        run: |
          aws s3 sync . "s3://${S3_BUCKET}" \
            --region "${S3_BUCKET_REGION}" \
            --exclude "*" \
            --include "*.png" \
            --include "*.svg" \
            --delete
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Report Status
        if: always()
        uses: ravsamhq/notify-slack-action@be814b201e233b2dc673608aa46e5447c8ab13f2
        with:
          status: ${{ job.status }}
          notification_title: "${{ github.workflow }} has {status_message}"
          message_format: "{emoji} *${{ github.workflow }}* {status_message} in <{repo_url}|{repo}>"
          footer: "Linked to Repo <{repo_url}|{repo}>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
